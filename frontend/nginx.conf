server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Oculta la versión de Nginx en headers y páginas de error
    server_tokens off;

    # ============================================================
    # BLOQUEAR SOURCE MAPS — nunca deben ser públicos en producción
    # ============================================================
    location ~* \.map$ {
        return 404;
        access_log off;
    }

    # ============================================================
    # HEADERS DE SEGURIDAD
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=()" always;
    # Evita que el navegador cachee respuestas de la API si el frontend las llama directamente
    add_header Cache-Control "no-store" always;

    # ============================================================
    # SPA — React Router
    # ============================================================
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # El index.html nunca debe cachearse (para que los deploys apliquen)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================================
    # ASSETS JS/CSS — se cachean por 1 año (tienen hash en el nombre)
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================================
    # OCULTAR ARCHIVOS SENSIBLES
    # ============================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
        log_not_found off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
