version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: schoolways_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      # Apunta directamente a backend en el puerto 5000
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: schoolways_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
      # Apuntamos a servidor SQL
      - DB_SERVER=db.schoolwaysv.online
      #  contenedor leerá el usuario y clave ya configurados